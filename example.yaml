# Example ESPHome configuration for BLEewerLite
# Demonstrates a two-light setup with an HS60C (key light) and HB80C (fill light).
# Replace MAC addresses with your own. See README for how to find them.

esphome:
  name: bleewer-controller
  friendly_name: "BLEewer Light Controller"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG

external_components:
  - source:
      type: local
      path: components
    components: [bleewer_light]

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 200ms
    window: 180ms

ble_client:
  # HS60C uses a public BLE address — easy to find with any BLE scanner
  - mac_address: "AA:BB:CC:DD:EE:FF"
    id: hs60c

  # HB80C uses a random BLE address and advertises infrequently (~5 min intervals)
  # Allow extra time for initial connection after boot
  - mac_address: "11:22:33:44:55:66"
    id: hb80c

switch:
  - platform: ble_client
    ble_client_id: hs60c
    name: "Key Light BLE"

  - platform: ble_client
    ble_client_id: hb80c
    name: "Fill Light BLE"

light:
  # HS60C: hybrid CCT (mode 2), RGB+CCT, 2700-6700K — auto-detected from model_name
  - platform: bleewer_light
    ble_client_id: hs60c
    name: "Key Light"
    model_name: "HS60C"
    default_transition_length: 0s  # CRITICAL: Neewer lights can't handle rapid BLE writes
    effects:
      - neewer_cop_car:
      - neewer_candlelight:
      - neewer_lightning:
      - neewer_party:
      - neewer_hue_loop:
      - neewer_fireworks:

  # HB80C: infinity protocol (mode 1), RGB+CCT, 2500-7500K — auto-detected from model_name
  - platform: bleewer_light
    ble_client_id: hb80c
    name: "Fill Light"
    model_name: "HB80C"
    default_transition_length: 0s
    effects:
      - neewer_cop_car:
      - neewer_candlelight:
      - neewer_lightning:
      - neewer_party:
      - neewer_hue_loop:
      - neewer_fireworks:
